          <li>{{username}}</li>

    </ul>

    <div class="account-nav" id="account-nav">
      {% if picture %}
      <img src="{{url_for('static', filename='uploads_userpic/' + picture)}}" alt="">
      {% endif %}
       <div class="userprofile" id="userprofile">
    <form method="post" id="changes_form" action="/profile-user/changes">
      
      <div class="account-nav" id="">
        {% if picture %}
        <img src="{{url_for('static', filename='uploads_userpic/'+ picture)}}" alt="">
        {% endif %}

             </div>

         <div class="change-pic" id="change-pic">         <input type="file" name="" value="" id="change-pic-input">
          <p>Change Photo</p>
        </div>

      <label for="" style="font-weight:900;">Username</label>
      <input type="" name="" value="" required placeholder="{{username}}" disabled id="c_c_name">
       <label for="" style="font-weight:900;">Email</label>
      <input type="" name="" value="" required placeholder="{{mail}}" disabled id="c_c_mail">
       <label for="" style="font-weight:900;">Password</label>
      <input type="" name="" value="" required placeholder="It's a secret baka" disabled id="c_c_pass">
      <div class="buttons-edit" id="buttons-edit">
         <button type="button" id="edit-btn" class="edit-btn">Edit</button>
         <button type="button" id="commit-changes" class="commit-changes">Commit Changes</button>

        
      </div>
      <button type="button" id="logout-btn" class="logout-btn">Log Out</button>
     

      
    </form>
    
  </div>

    </div>
    </div>

  </nav>

  <div class="waifu-container" id="waifu-container">
    <div class="waifu-track" id="waifu-track">
      {% for table in tables %}
         <div class="slide">
           <div class="slide-img" id="slide-img">
             {% if table.image %}
             <img src="{{url_for('static', filename='uploads_waifus_images/' + table.image)}}" alt="">
             {% endif %}
           </div>
           <div class="slide-info" id="slide-info">
             <h1>{{table.name}}</h1>
             <p>{{table.description}}</p>
           </div>
         </div>
      {% endfor %}
    </div>
    <button type="button" class="button btn-l" id="btn-l">L</button>
    <button type="button" class="button btn-r" id="btn-r">R</button>
    
  </div>

 
   <div class="add-waifu-form" id="add-waifu-form">
    <div class="close-btn" id="close-btn">
      <p>x</p>
    </div>

    <form id="waifu-form" class="waifu-form">
      <h1>Waifu Data</h1>
      <label for="name">Name</label>
      <input type="text" id="waifu-name">
      <label for="description">Description:</label>
      <textarea rows="10" cols="10" id="waifu-description"></textarea>
      <label for="image-waifu">Waifu Image</label>
      <input type="file" id="waifu-file">
      <img id="preview-waifu">
      <button type="button" id="amw">Add My Waifu</button>
    </form>
  </div>

   <script>
    const waifu_name = document.getElementById('waifu-name');
    const waifu_description = document.getElementById('waifu-description');
    const image_waifu = document.getElementById('waifu-file');
    const preview_waifu = document.getElementById('preview-waifu');
    const waifu_form = document.getElementById('waifu-form');
    const slides = document.querySelectorAll('.slide');
    const picture_user = document.getElementById('change-pic-input');
    const c_c_uname = document.getElementById('c_c_name');
    const form_changes = document.getElementById('changes_form');
    document.getElementById('c_c_name').disabled = true;
     document.getElementById('c_c_mail').disabled = true;



    

    let toggle = false;
    let toggle2 = false;
    let index_slide = 0;
    
    document.getElementById('account-nav').addEventListener("click", ()=>{
      toggle2 = !toggle2;
      if(toggle2){
        document.getElementById('userprofile').classList.add('active');
      }else{
         document.getElementById('userprofile').classList.remove('active');
          document.getElementById('c_c_name').disabled = true;
         document.getElementById('c_c_mail').disabled = true;





      }
    });



    window.addEventListener('load', ()=> {
      waifu_form.reset();
      form_changes.reset();
     
    });
    document.getElementById('add-waifu').addEventListener("click", ()=> {
      toggle = !toggle;

      if(toggle == true){
          document.getElementById('add-waifu-menu').classList.add('active');

      }
      else{
         document.getElementById('add-waifu-menu').classList.remove('active');

      }
        });
    document.getElementById('mwc-op').addEventListener("click", ()=> {
      document.getElementById('add-waifu-form').classList.add('active');
    });

    document.getElementById('close-btn').addEventListener("click", ()=> {
      document.getElementById('add-waifu-form').classList.remove('active');
    });

    image_waifu.addEventListener("change",()=> {
      const file = image_waifu.files[0];
      if(!file){
        return;
      }

      preview_waifu.src = URL.createObjectURL(file);
    });

    document.getElementById('amw').addEventListener("click", async (e) => {
      e.preventDefault();

      const formData = new FormData;
      formData.append("waifu-name",waifu_name.value);
      formData.append("waifu-description",waifu_description.value);
      if(image_waifu.files[0]){
        formData.append("waifu-image",image_waifu.files[0]);
      }
    const response = await fetch(`/home/add-waifu`,{
        method:"POST",
        body: formData
      });

      const data = await response.json();

      if(data.success){
        window.location.reload();
      }else{
        console.log("error");
      }
    
    });

    function tp_slide(n_slide){
       index_slide = (n_slide + slides.length) % slides.length;
      document.getElementById('waifu-track').style.transform = `translateX(-${index_slide * 100}%)`;
       
    }

    document.getElementById('btn-l').addEventListener("click", () =>{
      tp_slide(index_slide - 1 );
    });
    document.getElementById('btn-r').addEventListener("click", () =>{
      tp_slide(index_slide + 1 );
    });


    picture_user.addEventListener("change", async(e)=>{
      e.preventDefault();
      const userFormData = new FormData;

      if (picture_user.files[0]){
        userFormData.append("userpic", picture_user.files[0]);
      }

      const response = await fetch(`/profile-user/changes/userpic`,{
        method:"POST",
        body:userFormData
      });

      const data = await response.json();

      if(data.success){
        window.location.reload();
      }
      else{
        console.log("error");
      }


    });
  
    document.getElementById('edit-btn').addEventListener("click",(e) => {
      e.stopPropagation();
      document.getElementById('c_c_name').removeAttribute("disabled");
      document.getElementById('c_c_mail').removeAttribute("disabled");
    });

    document.getElementById('userprofile').addEventListener("click", (e) => {
  e.stopPropagation();
});
    document.getElementById('logout-btn').addEventListener("click", () => {
      window.location.href = '/logout';

    });
    document.getElementById('commit-changes').addEventListener("click", async (e)=>{
      e.preventDefault();
      const response = await fetch(`/profile-user/changes`, {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body: JSON.stringify({
          "new-name":document.getElementById('c_c_name').value,
          "new-mail":document.getElementById('c_c_mail').value
        })
      });
      const data = await response.json();

      if(data.success){
        window.location.reload();
      }
      else{
        console.log("error");
      }

    });

    

 

  </script>
</body>

</html>
