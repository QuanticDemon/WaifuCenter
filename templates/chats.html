<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="{{url_for('static', filename='css/styles.css')}}">
</head>
<body class="body-chat">
   <nav class="nav-bar-chat">
      <div class="user-info">
        <img src="{{url_for('static', filename='uploads_userpic/'+friend.user_pic)}}" alt="">
        <p>{{friend.username}}</p>

      </div>
      <div class="chat-ops" id="">
        <ul>
          <li>Phone</li>
          <li>Block</li>
          <li>:</li>
        </ul>
        
      </div>

    
   </nav>

   <div class="chat-body" id="chat-body">
    
     {% for message in my_messages %}
     <div class="{% if message.id_emisor==id %}user-msg{%else%}friend-msg{%endif%}">
      <p>{{ message.text_content }}</p>
      <small>{{ (message.send_date+ timedelta(hours=6)).strftime("%H:%M") }}</small>

     </div>
             {% endfor %}
        </div>

   <div class="user-input" id="">

     <button type="" class="add">+</button>
     <input type="text" name="" id='message' placeholder="{{user.username}}">
     <button type="" class="send" id="send"value="{{user.id_user}}">Send</button>
    
   </div>
   <script>
    const send_btn = document.getElementById('send');
    const message = document.getElementById('message');
    const chat_body = document.getElementById('chat-body');

    message.addEventListener('keydown', async (e)=>{
      
      if(e.key == "Enter" && message.value != ""){

        
      const response = await fetch(`/home/friends/c/{{chat_id_friend}}`,{
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body: JSON.stringify({
          "from":send_btn.value,
          "message": message.value
        })
      });

      const data = await response.json();
      
      if(data.success){
        console.log(data.date);
        const messageDiv = document.createElement('div');
        messageDiv.className = 'user-msg';
        
        const fecha = new Date(data.date);

        const hour = fecha.getHours().toString().padStart(2,"0");
        const minutes = fecha.getMinutes().toString().padStart(2,"0");

        const newHour = `${hour}:${minutes}`;

        messageDiv.innerHTML = `
           <p>${data.message}</p>
           <small>${newHour}</small>
        `;
        
        chat_body.appendChild(messageDiv);
        message.value = "";

        chat_body.scrollTo({
          top: chat_body.scrollHeight,
          behavior:"smooth"
        });


        

             
      }else{
        console.log('puta');

      }
      }


      
    });
   
    window.addEventListener("load",()=>{
      chat_body.scrollTop = chat_body.scrollHeight;
    });
    send_btn.addEventListener("click", async (e) => {
      e.preventDefault();

      const response = await fetch(`/home/friends/c/{{chat_id_friend}}`,{
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body: JSON.stringify({
          "from":send_btn.value,
          "message": message.value
        })
      });

      const data = await response.json();
      
      if(data.success){
        console.log(data.date);
        const messageDiv = document.createElement('div');
        messageDiv.className = 'user-msg';
        
        const fecha = new Date(data.date);

        const hour = fecha.getHours().toString().padStart(2,"0");
        const minutes = fecha.getMinutes().toString().padStart(2,"0");

        const newHour = `${hour}:${minutes}`;

        messageDiv.innerHTML = `
           <p>${data.message}</p>
           <small>${newHour}</small>
        `;
        
        chat_body.appendChild(messageDiv);
        message.value = "";

        chat_body.scrollTo({
          top: chat_body.scrollHeight,
          behavior:"smooth"
        });


        

             
      }else{
        console.log('puta');

      }
    });
   </script>
</body>
</html>
